version: "3"

services:

  n8n:
    image: n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - ./n8n_data:/home/node/.n8n
    restart: always

  flowise:
    image: flowiseai/flowise
    container_name: flowise
    ports:
      - "3000:3000"
    volumes:
      - ./flowise_data:/root/.flowise
    restart: always
